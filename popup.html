<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Search</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, sans-serif;
            width: 320px;
            background: #fff;
            color: #111;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px 10px;
            border-bottom: 1px solid #eee;
        }

        .header-left { display: flex; align-items: center; gap: 8px; }

        .logo { font-size: 18px; }

        .title { font-size: 15px; font-weight: 700; }

        .shortcut {
            font-size: 11px;
            color: #888;
            margin-top: 1px;
        }

        /* Toggle */
        .toggle-wrap { display: flex; align-items: center; gap: 6px; }

        .toggle-label { font-size: 12px; font-weight: 600; color: #444; }

        .toggle {
            position: relative;
            width: 40px;
            height: 22px;
            cursor: pointer;
        }

        .toggle input { display: none; }

        .slider {
            position: absolute;
            inset: 0;
            background: #ccc;
            border-radius: 22px;
            transition: background 0.2s;
        }

        .slider::before {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            left: 3px;
            top: 3px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        input:checked + .slider { background: #0070f3; }
        input:checked + .slider::before { transform: translateX(18px); }

    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <span class="logo">🔍</span>
            <div>
                <div class="title">Quick Search</div>
                <div class="shortcut">Press Alt+S to search</div>
            </div>
        </div>
        <div class="toggle-wrap">
            <span class="toggle-label" id="toggle-label">ON</span>
            <label class="toggle">
                <input type="checkbox" id="enabled-toggle" checked />
                <span class="slider"></span>
            </label>
        </div>
    </div>

<script src="popup.js"></script>
</body>
</html>
